name: spend_sum
description: "An elegant, high-fidelity Spend Summary tracking application built with Flutter and Clean Architecture."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.9
  drift: ^2.33.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pinput: ^6.0.2
  shared_preferences: ^2.5.5
  smooth_page_indicator: ^2.0.1
  sqlite3_flutter_libs: ^0.6.0+eol
  animated_digit: ^3.3.3
  animations: ^2.0.11
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/spalsh/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700



